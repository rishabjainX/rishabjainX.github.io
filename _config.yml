title: Rishab Jain
tagline: Researcher · AI governance & computational policy
author:
  name: Rishab Jain
  location: Fremont, CA
  linkedin: rishabjainx
  github: rishabjainX

description: >-
  Personal site of Rishab Jain — researcher working on AI governance and
  computational policy, with a focus on algorithmic fairness in the
  criminal-legal system.

url: "https://rishabjainx.github.io"
baseurl: ""

include:
  - _pages

permalink: /:title/

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

sass:
  style: compressed
  sass_dir: _sass

defaults:
  - scope:
      path: ""
    values:
      layout: default

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - README.md
  - .sass-cache
